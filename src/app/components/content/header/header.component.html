<header class="bg-white border-b border-slate-200 sticky top-0 z-50 font-sans">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-16">
      
      <div class="flex items-center gap-2">
        <div class="bg-blue-600 p-1.5 rounded-lg shadow-md">
          <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
          </svg>
        </div>
        <h1 class="text-xl font-extrabold text-slate-900 tracking-tight">KORE</h1>
      </div>

      <div class="flex items-center md:hidden">
        <button (click)="toggleMobileMenu()" class="text-slate-500 hover:text-slate-900 focus:outline-none">
          @if (!isMobileMenuOpen) {
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          } @else {
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          }
        </button>
      </div>

      <div class="hidden md:flex md:items-center md:gap-5">
        
        <button class="text-slate-400 hover:text-blue-600 relative transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
          </svg>
          <span class="absolute top-[-2px] right-[-2px] block h-2.5 w-2.5 rounded-full bg-red-500 ring-2 ring-white"></span>
        </button>

        <div class="flex items-center gap-3 border-l border-slate-200 pl-5">
          <span class="text-sm font-bold text-slate-900 tracking-tight">
            {{ authService.currentUser()?.username || 'Usuário' }}
          </span>
          
          <div class="relative">
             <img 
               src="image.png" 
               alt="Avatar do Usuário" 
               class="w-10 h-10 rounded-full object-cover ring-2 ring-slate-100 shadow-sm"
             >
             <span class="absolute bottom-0 right-0 block h-3 w-3 rounded-full bg-green-500 ring-2 ring-white"></span>
          </div>

          <button (click)="onLogout()" class="text-slate-400 hover:text-red-500 pl-2 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 11-6 0v-1m6-10V4a3 3 0 11-6 0v1"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  @if (isMobileMenuOpen) {
    <div class="md:hidden bg-slate-50 border-t border-slate-100 animate-in slide-in-from-top duration-200">
      <div class="px-4 py-3 space-y-1">
        
        <div class="flex items-center gap-3 mb-4 p-3 bg-white rounded-2xl border border-slate-200 shadow-sm">
           <img 
             src="image.png" 
             class="w-12 h-12 rounded-full object-cover"
           >
           <div class="overflow-hidden">
              <p class="font-bold text-slate-900 truncate">
                {{ authService.currentUser()?.username || 'Usuário' }}
              </p>
              <p class="text-xs text-slate-500 truncate">
                {{ authService.currentUser()?.email }}
              </p>
           </div>
        </div>

        <a href="#" class="block px-3 py-2.5 rounded-xl text-base font-semibold text-slate-700 hover:bg-white hover:text-blue-600 transition-all">Suporte</a>
        <a href="#" class="block px-3 py-2.5 rounded-xl text-base font-semibold text-slate-700 hover:bg-white hover:text-blue-600 transition-all">Configurações</a>
        
        <div class="pt-2 border-t border-slate-200 mt-2">
          <button (click)="onLogout()" class="flex items-center gap-2 w-full text-left px-3 py-3 rounded-xl text-base font-bold text-red-600 hover:bg-red-50 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7"/>
            </svg>
            Sair do GoTask
          </button>
        </div>
      </div>
    </div>
  }
</header>
